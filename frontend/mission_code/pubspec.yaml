name: mission_code
description: Plataforma gamificada para Ingeniería de Software
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado y navegación
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0

  # HTTP y red
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # Almacenamiento seguro
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3

  # Utilidades
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700